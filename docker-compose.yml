services:
  medical-web:
    build:
      context: ./apps/medical-web
      target: runtime
    environment:
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://taitaoantam.vn}
      PUBLIC_STRAPI_URL: ${PUBLIC_STRAPI_URL:-http://strapi:1337}
    restart: unless-stopped
    depends_on:
      - strapi

  strapi:
    build:
      context: ./services/strapi-cms
      target: runtime
    env_file:
      - ./services/strapi-cms/.env.production
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-base_cms}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-base_cms}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-base_cms}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-1337}
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-base_cms}
      POSTGRES_USER: ${POSTGRES_USER:-base_cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-base_cms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - medical-web
      - strapi

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
